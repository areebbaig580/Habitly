<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashoard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
     <header>
        <div class="heading-box">
            <div class="heading1">Dashboard</div>
            <i class="fa-solid fa-arrow-right-from-bracket symbol"></i>
        </div>
    </header>
    <main>
        <div class="section1">
            <div class="box">
                <div class="heading">Today's progress</div>
                <div class="icon icn-bg1"><i class="fa-solid fa-bullseye ic1"></i></div>
                <div class="details">
                    <div class="det1 complPercent"></div>
                    <div class="det2 percentDet"></div>
                </div>

            </div>
            <div class="box">
                <div class="heading">Current streak</div>
                <div class="icon icn-bg2"><i class="fa-solid fa-fire ic2"></i></div>
                <div class="details">
                    <div class="det1 streak">0</div>
                    <div class="det2">Days in a row</div>
                </div>
            </div>
            <div class="box">
                <div class="heading">Total habits</div>
                <div class="icon icn-bg3"><i class="fa-solid fa-arrow-trend-up ic3"></i></div>
                <div class="details">
                    <div class="det1 tracked"></div>
                    <div class="det2">being tracked</div>
                </div>
            </div>
        </div>
        <div class="section2">
            <div class="heading">Daily activity</div>
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
        </div>
        <div class="section2">

        </div>
    </main>
    <script src="dashbord.js"></script>
</body>
</html>
