<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit-tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header>
        <div class="nav">
            <div class="brand-name"><i class="fa-solid fa-bridge icon"></i> Habitly</div>
            <div class="nav-links">
                <a href=""><i class="fa-solid fa-chart-column dashSymbol"></i> Dashoard</a>
            </div>
        </div>
    </header>
    <main>
        <div class="date-container"></div>
        <div class="section">
            <div class="ctr">
                <div class="heading">To do</div>
                <i class="fa-solid fa-plus add"></i>
                <div class="list"></div>
            </div>
            <div class="ctr">
                <div class="heading">Reminders</div>
                <i class="fa-solid fa-plus add"></i>
            </div>
        </div>
        <div class="section">
            <div class="habits-ctr">
                <div class="heading">Habits</div>
                <i class="fa-solid fa-plus add"></i>
                <div class="habits"></div>
            </div>
            <div class="comp-ctr">
                <div class="heading">Completed</div>
            </div>
        </div>
        

    </main>
    <script src="script.js"></script>
</body>

</html>
