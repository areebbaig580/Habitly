<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit-tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <header>
        <div class="nav">
            <div class="brand-name"><i class="fa-solid fa-bridge icon"></i> Habitly</div>
            <div class="nav-links">
                <a href="dashboard/dashboard.html"><i class="fa-solid fa-chart-column dashSymbol"></i> Dashoard</a>
            </div>
        </div>
    </header>
    <main>
        <div class="date-container"></div>
        <div class="section">
            <div class="habits-ctr">
                <div class="heading">Habits</div>
                <div class="habits"></div>
            </div>
            <div class="comp-ctr">
                <div class="heading">Progress</div>
                <div class="chart-container">
                    <canvas id="myChart" class="chart"></canvas>
                    <div class="colorCardsCont">
                        <div class="colorCard">
                            <div class="completed-hab-clr"></div>
                            <div class="colorname">Habits completed</div>
                        </div>
                        <div class="colorCard">
                            <div class="remaining-habit-clr"></div>
                            <div class="colorname">Habits remaining</div>
                        </div>
                    </div>
                </div>
                <div class="details-ctr">
                    <div class="habitDet"></div>
                    <div class="taskDet"></div>
                </div>
            </div>
        </div>
        <div class="section">
            <div class="ctr1">
                <div class="heading">To do</div>
                <div class="list"></div>
            </div>
            <div class="ctr2">
                <div class="heading">Add</div>
                <div class="filter">
                    <label for="filter" class="filter-det">Add </label>
                    <select id="filter" name="filter" class="dropdown">
                        <option value="tasks">Task</option>
                        <option value="habits">Habit</option>
                    </select>
                </div>

                <form action="" class="form">
                    <div class="form-elm">
                        <div class="label">Add Task name</div>
                        <input type="text" class="input" id="input" placeholder="Enter task" required>
                    </div>
                    <div class="radio-btns">
                        <div class="type">Priority Type</div>
                        <input type="radio" name="Priortype" value="high" class="radio-bt" required>
                        High
                        <input type="radio" name="Priortype" value="medium" class="radio-bt" required>
                        Medium
                        <input type="radio" name="Priortype" value="low" class="radio-bt" required>
                        Low
                    </div>
                    <div class="btn-ctr">
                        <button class="btn">add</button>
                    </div>
                </form>

            </div>
        </div>
        <div class="space"></div>



    </main>
    <script src="script.js"></script>
</body>

</html>
